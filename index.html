<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AIM">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a246a">
<title>AOL Instant Messenger</title>
<style>
  :root {
    --aim-blue-dark: #0a246a;
    --aim-blue-mid: #3a6ea5;
    --aim-blue-light: #a6caf0;
    --aim-yellow: #ffcc00;
    --aim-cream: #fffce0;
    --win-face: #ece9d8;
    --win-shadow: #aca899;
    --win-light: #ffffff;
    --win-dark: #716f64;
    --ghost-color: #b22222;
    --player-color: #00008b;
    --safe-top: env(safe-area-inset-top);
    --safe-bot: env(safe-area-inset-bottom);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: #008080;
    font-family: Tahoma, Geneva, "MS Sans Serif", sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  body {
    background:
      repeating-linear-gradient(45deg, rgba(0,0,0,0.04) 0 2px, transparent 2px 6px),
      #008080;
    padding: var(--safe-top) max(8px, env(safe-area-inset-right)) var(--safe-bot) max(8px, env(safe-area-inset-left));
    display: flex;
    align-items: stretch;
    justify-content: center;
  }

  /* ===== Sign-on screen ===== */
  #signon {
    position: fixed; inset: 0;
    background: #ece9d8;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bot) + 16px);
    z-index: 100;
  }
  #signon .titlebar {
    width: 100%; max-width: 420px;
    background: linear-gradient(180deg, #0a64bd 0%, #0a246a 100%);
    color: white; font-weight: bold;
    padding: 6px 10px;
    display: flex; align-items: center; gap: 8px;
    border: 2px outset #d4d0c8;
    border-bottom: none;
  }
  #signon .titlebar .runner { font-size: 16px; }
  #signon .signon-body {
    width: 100%; max-width: 420px;
    background: #ece9d8;
    border: 2px outset #d4d0c8;
    border-top: none;
    padding: 18px 18px 22px;
    text-align: center;
  }
  #signon .logo {
    font-size: 64px; line-height: 1;
    margin: 4px 0 12px;
    color: var(--aim-yellow);
    text-shadow: 2px 2px 0 #b8860b, 4px 4px 6px rgba(0,0,0,0.3);
    font-weight: bold;
  }
  #signon h1 {
    margin: 0 0 14px;
    font-size: 18px; font-weight: bold;
    color: #222;
  }
  #signon label {
    display: block; text-align: left;
    font-size: 13px; margin: 10px 0 4px;
    color: #222;
  }
  #signon .field {
    width: 100%;
    background: white;
    border: 2px inset #d4d0c8;
    padding: 8px 10px;
    font-family: inherit; font-size: 15px;
    color: #444;
  }
  #signon .signon-btn {
    margin-top: 22px;
    background: linear-gradient(180deg, #fffce0 0%, #ffcc00 100%);
    border: 2px outset #d4d0c8;
    padding: 12px 36px;
    font-family: inherit; font-size: 16px; font-weight: bold;
    color: #222;
    cursor: pointer;
    min-width: 140px;
    min-height: 44px;
  }
  #signon .signon-btn:active {
    border-style: inset;
    background: linear-gradient(180deg, #ffcc00 0%, #fffce0 100%);
  }
  #signon .footer-links {
    margin-top: 18px;
    font-size: 12px; color: #555;
  }
  #signon .footer-links a {
    color: #00008b; text-decoration: underline;
    margin: 0 8px;
  }

  /* ===== IM Window ===== */
  #app {
    display: none;
    width: 100%; height: 100%;
    flex-direction: column;
    max-width: 720px;
    margin: 0 auto;
  }
  #app.visible { display: flex; }

  .window {
    flex: 1 1 auto;
    display: flex; flex-direction: column;
    background: var(--win-face);
    border: 2px outset #d4d0c8;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.25);
    min-height: 0;
  }

  .titlebar {
    background: linear-gradient(180deg, #0a64bd 0%, #0a246a 100%);
    color: white;
    padding: 5px 6px 5px 8px;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: bold;
    flex: 0 0 auto;
  }
  .titlebar .icon {
    width: 16px; height: 16px;
    background: var(--aim-yellow);
    border-radius: 50%;
    display: inline-block;
    box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  .titlebar .title-text {
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .titlebar .winbtns {
    display: flex; gap: 2px;
  }
  .titlebar .winbtn {
    width: 22px; height: 20px;
    background: #d4d0c8;
    border: 1px outset #fff;
    color: black;
    font-size: 11px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }

  .menubar {
    background: var(--win-face);
    padding: 2px 4px;
    font-size: 12px; color: #222;
    display: flex; gap: 14px;
    border-bottom: 1px solid #aca899;
    flex: 0 0 auto;
  }
  .menubar span { padding: 1px 4px; }
  .menubar span u { text-decoration: underline; }

  .buddyinfo {
    background: var(--win-face);
    padding: 6px 8px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #aca899;
    flex: 0 0 auto;
  }
  .buddyinfo .ghost-name {
    flex: 1;
    font-size: 13px; font-weight: bold; color: #222;
  }
  .buddyinfo .status-dot {
    width: 8px; height: 8px;
    background: #2a8f2a; border-radius: 50%;
    box-shadow: 0 0 4px #4eee4e;
  }
  .buddyinfo .status-text {
    font-size: 11px; color: #555;
  }

  .conversation {
    flex: 1 1 auto;
    background: white;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px 10px;
    font-size: 15px;
    line-height: 1.4;
    color: #111;
    border: 2px inset #d4d0c8;
    margin: 4px;
    min-height: 0;
  }
  .conversation .msg {
    margin: 4px 0;
    word-wrap: break-word;
    -webkit-user-select: text;
    user-select: text;
  }
  .conversation .msg .who {
    font-weight: bold;
  }
  .conversation .msg.ghost .who { color: var(--ghost-color); }
  .conversation .msg.player .who { color: var(--player-color); }
  .conversation .system {
    text-align: center;
    color: #888;
    font-style: italic;
    font-size: 12px;
    margin: 8px 0;
  }
  .typing {
    color: #888; font-style: italic; font-size: 13px;
    margin: 4px 0;
  }
  .typing .dot {
    display: inline-block;
    animation: blink 1.2s infinite;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 60%, 100% { opacity: 0.2; }
    30% { opacity: 1; }
  }

  .formatbar {
    background: var(--win-face);
    padding: 4px 6px;
    display: flex; gap: 4px; align-items: center;
    border-top: 1px solid #aca899;
    border-bottom: 1px solid #aca899;
    flex: 0 0 auto;
    font-size: 12px;

  .formatbar .fbtn {
    width: 26px; height: 24px;
    background: var(--win-face);
    border: 1px outset #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; color: #222;
    font-size: 12px;

  .formatbar .fbtn.italic { font-style: italic; font-weight: normal; }
  .formatbar .fbtn.under { text-decoration: underline; font-weight: normal; }
  .formatbar .swatch {
    width: 18px; height: 18px;
    border: 1px solid #555;
    margin-left: 4px;
  }

  .choices {
    background: var(--win-face);
    padding: 8px;
    display: flex; flex-direction: column; gap: 8px;
    flex: 0 0 auto;
    border-top: 2px solid #aca899;
    max-height: 45%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .choice {
    width: 100%;
    background: linear-gradient(180deg, #fffce0 0%, #ffe680 100%);
    border: 2px outset #d4d0c8;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 15px;
    text-align: left;
    color: #111;
    min-height: 48px;
    cursor: pointer;
    line-height: 1.3;
    -webkit-user-select: none;
    user-select: none;
  }
  .choice:active {
    border-style: inset;
    background: linear-gradient(180deg, #ffe680 0%, #fffce0 100%);
  }
  .choice[disabled] {
    opacity: 0.5;
    pointer-events: none;
  }

  .placeholder-input {
    background: white;
    border: 2px inset #d4d0c8;
    margin: 4px;
    padding: 6px 8px;
    color: #aaa;
    font-size: 13px; font-style: italic;
    flex: 0 0 auto;
    min-height: 32px;
    display: flex; align-items: center;
  }

  /* iPhone-specific: tighten padding */
  @media (max-width: 480px) {
    .conversation { font-size: 14px; padding: 6px 8px; }
    .choice { font-size: 14px; padding: 10px 12px; min-height: 44px; }
    .menubar { display: none; }
    .formatbar { display: none; }
    .placeholder-input { display: none; }
  }
</style>
</head>

<script>
/* =====================================================================
   CONFIG — edit these to taste
   ===================================================================== */

  ghostScreenName: "L0stLantern_99", // shows on incoming + title bar
  typingSpeedMs: 28,                // per-character typing delay (sim)
  ghostMessageGapMs: 600,           // pause between ghost lines
  postChoiceDelayMs: 450,           // pause after player taps a choice
  sounds: {
    signon:  "sounds/signon.wav",   // door-open (buddy signs on)
    signoff: "sounds/signoff.wav",  // door-close (buddy signs off)
    imrcv:   "sounds/imrcv.wav",    // incoming IM
    imsend:  "sounds/imsend.wav",   // outgoing IM

/* =====================================================================
   AUDIO — unlock on first user gesture (iOS requirement)
   ===================================================================== */
const audioCache = {};
let audioUnlocked = false;

function preloadSounds() {
  for (const [key, src] of Object.entries(CONFIG.sounds)) {
    const a = new Audio(src);
    a.preload = "auto";
    audioCache[key] = a;
  }
}

function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  for (const a of Object.values(audioCache)) {
    a.muted = true;
    a.volume = 0;
    const restore = () => {
      a.pause();
      a.currentTime = 0;
      a.muted = false;
      a.volume = 1;
    };
    const p = a.play();
    if (p && typeof p.then === "function") {
      p.then(restore).catch(restore);
    } else {
      restore();
    }
  }
}

function play(name) {
  const src = audioCache[name];
  if (!src) return;
  try {
    const clone = src.cloneNode();
    clone.volume = 1.0;
    clone.play().catch(() => {});
  } catch (e) { /* swallow */ }
}

/* =====================================================================
   CHAT ENGINE
   ===================================================================== */
const $convo = document.getElementById("conversation");
const $choices = document.getElementById("choices");
const $titleText = document.getElementById("titleText");
const $ghostNameTop = document.getElementById("ghostNameTop");
const $inputPlaceholder = document.getElementById("inputPlaceholder");

function scrollToBottom() {
  requestAnimationFrame(() => { $convo.scrollTop = $convo.scrollHeight; });
}

function addSystem(text) {
  const div = document.createElement("div");
  div.className = "system";
  div.textContent = text;
  $convo.appendChild(div);
  scrollToBottom();
}

function addMessage(who, name, text, color) {
  const div = document.createElement("div");
  div.className = "msg " + who;
  const whoSpan = document.createElement("span");
  whoSpan.className = "who";
  whoSpan.textContent = name + ": ";
  div.appendChild(whoSpan);
  const txt = document.createElement("span");
  txt.textContent = text;
  div.appendChild(txt);
  $convo.appendChild(div);
  scrollToBottom();
}

function showTyping(name) {
  const div = document.createElement("div");
  div.className = "typing";
  div.id = "typingIndicator";
  div.innerHTML = name + " is typing<span class='dot'>.</span><span class='dot'>.</span><span class='dot'>.</span>";
  $convo.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const t = document.getElementById("typingIndicator");
  if (t) t.remove();
}

function clearChoices() {
  $choices.innerHTML = "";
}

function renderChoices(choices, onPick) {
  clearChoices();
  for (const c of choices) {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = "› " + c.text;
    btn.addEventListener("click", () => {
      Array.from($choices.querySelectorAll(".choice")).forEach(b => b.disabled = true);
      onPick(c);
    });
    $choices.appendChild(btn);
  }
}

const wait = ms => new Promise(r => setTimeout(r, ms));

async function ghostSay(line) {
  showTyping(CONFIG.ghostScreenName);
  const typingMs = Math.min(2200, Math.max(700, line.length * CONFIG.typingSpeedMs));
  await wait(typingMs);
  hideTyping();
  play("imrcv");
  addMessage("ghost", CONFIG.ghostScreenName, line);
}

async function playerSay(text) {
  play("imsend");
  addMessage("player", CONFIG.playerScreenName, text);
}

async function runNode(key) {
  const node = DIALOGUE[key];
  if (!node) {
    addSystem("(dialogue node '" + key + "' not found)");
    return;
  }
  clearChoices();
  for (const line of node.ghost) {
    await ghostSay(line);
    await wait(CONFIG.ghostMessageGapMs);
  }
  if (!node.choices || node.choices.length === 0) {
    await wait(900);
    signOff();
    return;
  }
  renderChoices(node.choices, async (choice) => {
    await playerSay(choice.text);
    await wait(CONFIG.postChoiceDelayMs);
    runNode(choice.next);
  });
}

function signOff() {
  play("goodbye");
  clearChoices();
  $inputPlaceholder.textContent = "— conversation ended —";
  setTimeout(() => {
    play("signoff");
    addSystem(CONFIG.ghostScreenName + " signed off at " + nowStr() + ".");
  }, CONFIG.goodbyeToSignoffMs);
}

function nowStr() {
  const d = new Date();
  let h = d.getHours(); const m = d.getMinutes();
  const ap = h >= 12 ? "PM" : "AM";
  h = h % 12; if (h === 0) h = 12;
  return h + ":" + (m < 10 ? "0" : "") + m + " " + ap;
}

/* =====================================================================
   STARTUP
   ===================================================================== */
function startApp() {
  document.getElementById("signon").style.display = "none";
  document.getElementById("app").classList.add("visible");
  $titleText.textContent = CONFIG.ghostScreenName + " — Instant Message";
  $ghostNameTop.textContent = CONFIG.ghostScreenName;
  document.getElementById("sn").value = CONFIG.playerScreenName;

  setTimeout(() => {
    play("signon");
    addSystem(CONFIG.ghostScreenName + " signed on at " + nowStr() + ".");
    setTimeout(() => runNode("start"), 1100);
  }, 250);
}

window.addEventListener("DOMContentLoaded", () => {
  preloadSounds();
  document.getElementById("sn").value = CONFIG.playerScreenName;
  document.getElementById("signonBtn").addEventListener("click", () => {
    unlockAudio();
    startApp();
  });
  document.addEventListener("touchstart", unlockAudio, { once: true, passive: true });
  document.addEventListener("gesturestart", e => e.preventDefault());
  document.addEventListener("touchmove", e => {
    if (e.scale && e.scale !== 1) e.preventDefault();
  }, { passive: false });
});
</script>
