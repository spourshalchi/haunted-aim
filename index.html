<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Campaign">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a246a">
<title>Campaign — Programs</title>
<style>
  :root {
    --safe-top: env(safe-area-inset-top);
    --safe-bot: env(safe-area-inset-bottom);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    font-family: Tahoma, Geneva, "MS Sans Serif", sans-serif;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    background:
      repeating-linear-gradient(45deg, rgba(0,0,0,0.04) 0 2px, transparent 2px 6px),
      #008080;
  }
  body {
    padding: var(--safe-top) max(8px, env(safe-area-inset-right)) var(--safe-bot) max(8px, env(safe-area-inset-left));
    display: flex; align-items: center; justify-content: center;
  }
  .window {
    width: 100%; max-width: 560px;
    max-height: 100%;
    display: flex; flex-direction: column;
    background: #ece9d8;
    border: 2px outset #d4d0c8;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.25);
  }
  .titlebar {
    background: linear-gradient(180deg, #0a64bd 0%, #0a246a 100%);
    color: white;
    padding: 6px 8px;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: bold;
    flex: 0 0 auto;
  }
  .titlebar .icon {
    width: 16px; height: 16px;
    background: #ffcc00;
    border-radius: 50%;
    box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  .titlebar .title-text {
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .titlebar .winbtns { display: flex; gap: 2px; }
  .titlebar .winbtn {
    width: 22px; height: 20px;
    background: #d4d0c8;
    border: 1px outset #fff;
    color: black;
    font-size: 11px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .menubar {
    background: #ece9d8;
    padding: 2px 4px;
    font-size: 12px; color: #222;
    display: flex; gap: 14px;
    border-bottom: 1px solid #aca899;
    flex: 0 0 auto;
  }
  .menubar span { padding: 1px 4px; }
  .menubar u { text-decoration: underline; }
  .body {
    padding: 14px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    flex: 1 1 auto;
    background: #ece9d8;
  }
  .greeting {
    font-size: 13px;
    color: #333;
    margin: 0 0 14px;
    padding: 8px 10px;
    background: #fffce0;
    border: 1px solid #d4cc88;
    line-height: 1.4;
  }
  .greeting b { color: #b22222; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
  }
  .tile {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: linear-gradient(180deg, #ffffff 0%, #ece9d8 100%);
    border: 2px outset #d4d0c8;
    text-decoration: none;
    color: #111;
    min-height: 76px;
    cursor: pointer;
  }
  .tile:active {
    border-style: inset;
    background: linear-gradient(180deg, #ece9d8 0%, #ffffff 100%);
  }
  .tile .glyph {
    flex: 0 0 56px;
    height: 56px;
    background: linear-gradient(180deg, #fffce0 0%, #ffcc00 100%);
    border: 2px outset #fff5b0;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold;
    font-size: 13px;
    color: #5a3a00;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
    letter-spacing: 1px;
  }
  .tile .meta { flex: 1; min-width: 0; }
  .tile .name {
    font-weight: bold;
    font-size: 15px;
    color: #00008b;
    margin: 0 0 2px;
  }
  .tile .desc {
    font-size: 12px;
    color: #444;
    line-height: 1.3;
    margin: 0;
  }
  .tile.disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }
  .tile.disabled .glyph {
    background: linear-gradient(180deg, #e0e0e0 0%, #b8b8b8 100%);
    border-color: #ccc;
    color: #666;
  }
  .statusbar {
    background: #ece9d8;
    padding: 4px 8px;
    border-top: 1px solid #aca899;
    font-size: 11px;
    color: #555;
    display: flex; justify-content: space-between;
    flex: 0 0 auto;
  }
</style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span class="icon"></span>
      <span class="title-text">Programs — Connection Established</span>
      <span class="winbtns">
        <span class="winbtn">_</span>
        <span class="winbtn">▢</span>
        <span class="winbtn">×</span>
      </span>
    </div>
    <div class="menubar">
      <span><u>F</u>ile</span>
      <span><u>V</u>iew</span>
      <span><u>H</u>elp</span>
    </div>
    <div class="body">
      <p class="greeting">
        Welcome back. <b>3 unread transmissions.</b> Select a program to open.
      </p>
      <div class="grid">

        <a class="tile" href="aim/">
          <div class="glyph">AIM</div>
          <div class="meta">
            <p class="name">AOL Instant Messenger</p>
            <p class="desc">A buddy is online. Tap to open chat.</p>
          </div>
        </a>

        <!-- Add new props as <a class="tile" href="prop-name/"> blocks below -->

      </div>
    </div>
    <div class="statusbar">
      <span>1 program · 0 errors</span>
      <span>online</span>
    </div>
  </div>
</body>
</html>
